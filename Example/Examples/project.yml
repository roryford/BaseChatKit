name: BaseChatExamples
options:
  bundleIdPrefix: com.basechatkit
  deploymentTarget:
    iOS: "18.0"
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  BaseChatKit:
    path: ../..

targets:
  MinimalExample:
    type: application
    platform: [iOS, macOS]
    sources:
      - MinimalExample
    dependencies:
      - package: BaseChatKit
        product: BaseChatCore
      - package: BaseChatKit
        product: BaseChatUI
      - package: BaseChatKit
        product: BaseChatBackends
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.basechatkit.minimal-example
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES

  NarrationExample:
    type: application
    platform: [iOS, macOS]
    sources:
      - NarrationExample
    dependencies:
      - package: BaseChatKit
        product: BaseChatCore
      - package: BaseChatKit
        product: BaseChatUI
      - package: BaseChatKit
        product: BaseChatBackends
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.basechatkit.narration-example
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
