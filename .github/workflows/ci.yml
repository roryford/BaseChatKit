name: CI

on:
  push:
    branches: [main]
    paths:
      - "Sources/**"
      - "Tests/**"
      - "Package.swift"
      - "Package.resolved"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "Sources/**"
      - "Tests/**"
      - "Package.swift"
      - "Package.resolved"
      - ".github/workflows/ci.yml"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-15  # Apple Silicon (arm64) standard runner to reduce spend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        id: setup-xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          # Pin to a specific version for reproducible builds and to skip the
          # version-discovery API call that `latest-stable` requires.
          xcode-version: "26.3"

      - name: Cache SwiftPM build
        uses: actions/cache@v5
        with:
          path: |
            .build/artifacts
            .build/checkouts
            .build/repositories
            .build/debug
          key: ${{ runner.os }}-${{ runner.arch }}-xcode-26.3-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-xcode-26.3-spm-
            ${{ runner.os }}-${{ runner.arch }}-spm-

      # CI smoke profile (GitHub macOS Apple Silicon runners):
      # - Runs BaseChatCoreTests + BaseChatInferenceTests + BaseChatUITests + BaseChatBackendsTests.
      # - --disable-default-traits skips MLX (default-enabled) to avoid metallib
      #   crashes in CI — Metal shaders are only compiled by Xcode.
      # - BaseChatBackendsTests without traits runs only CI-safe cloud/SSE tests.
      # Local-only coverage:
      # - Run `swift test --filter BaseChatBackendsTests --traits MLX,Llama` on
      #   Apple Silicon for MLX/llama.cpp paths.
      # - Run `swift test --filter BaseChatE2ETests` on physical hardware.

      - name: Build
        run: swift build --build-tests --disable-default-traits

      - name: Test — Core
        run: swift test --filter BaseChatCoreTests --disable-default-traits

      - name: Test — Inference
        run: swift test --filter BaseChatInferenceTests --disable-default-traits

      - name: Test — UI
        run: swift test --filter BaseChatUITests --disable-default-traits

      - name: Test — Backends
        run: swift test --filter BaseChatBackendsTests --disable-default-traits
