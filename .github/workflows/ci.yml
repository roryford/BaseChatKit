name: CI

on:
  push:
    branches: [main]
    paths:
      - "Sources/**"
      - "Tests/**"
      - "Package.swift"
      - "Package.resolved"
      - ".github/workflows/ci.yml"
      - "scripts/test.sh"
      - "scripts/example-ui-tests.sh"
  pull_request:
    branches: [main]
    paths:
      - "Sources/**"
      - "Tests/**"
      - "Package.swift"
      - "Package.resolved"
      - ".github/workflows/ci.yml"
      - "scripts/test.sh"
      - "scripts/example-ui-tests.sh"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-15  # Apple Silicon (arm64) standard runner to reduce spend

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # paths-filter needs the parent commit to diff against on `push` events;
          # `pull_request` works with the default shallow clone.
          fetch-depth: 2

      - name: Detect dependency-graph changes
        id: deps-changed
        uses: dorny/paths-filter@v3
        with:
          filters: |
            deps:
              - 'Package.swift'
              - 'Package.resolved'

      - name: Select Xcode
        id: setup-xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          # Pin to a specific version for reproducible builds and to skip the
          # version-discovery API call that `latest-stable` requires.
          xcode-version: "26.3"

      - name: Cache SwiftPM build
        uses: actions/cache@v5
        with:
          # .build/debug is intentionally excluded: SwiftPM module fingerprints
          # embed absolute paths + compiler timestamps, so restored object files
          # are invalidated on every fresh ephemeral runner. Caching .build/debug
          # produced 0 incremental-build savings in practice and wasted the 10 GB
          # per-repo cache quota. .build/artifacts holds the prebuilt llama.cpp
          # xcframework (~100 MB, the real win); .build/checkouts + repositories
          # save the per-dep clone phase.
          path: |
            .build/artifacts
            .build/checkouts
            .build/repositories
          key: ${{ runner.os }}-${{ runner.arch }}-xcode-26.3-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-xcode-26.3-fuzz-spm-${{ hashFiles('Package.resolved') }}
            ${{ runner.os }}-${{ runner.arch }}-xcode-26.3-spm-
            ${{ runner.os }}-${{ runner.arch }}-spm-

      - name: Verify Swift toolchain matches Package.swift tools-version
        # The runner's Xcode (pinned above) ships a specific Swift version. If
        # `swift-tools-version` in Package.swift exceeds that, `swift package
        # resolve` and every subsequent build will fail with a confusing error.
        # Catch the mismatch here with a clear message naming both versions.
        run: |
          set -euo pipefail
          tools_line=$(head -n 1 Package.swift)
          tools_version=$(printf '%s\n' "$tools_line" | sed -E 's|^//[[:space:]]*swift-tools-version:[[:space:]]*([0-9]+\.[0-9]+).*|\1|')
          if ! [[ "$tools_version" =~ ^[0-9]+\.[0-9]+$ ]]; then
            echo "Could not parse swift-tools-version from first line of Package.swift: $tools_line"
            exit 1
          fi
          swift_version_full=$(xcrun swift -version | head -n 1)
          swift_version=$(printf '%s\n' "$swift_version_full" | sed -E 's|.*Swift version ([0-9]+\.[0-9]+).*|\1|')
          if ! [[ "$swift_version" =~ ^[0-9]+\.[0-9]+$ ]]; then
            echo "Could not parse Swift major.minor from: $swift_version_full"
            exit 1
          fi
          tools_major=${tools_version%.*}; tools_minor=${tools_version#*.}
          swift_major=${swift_version%.*}; swift_minor=${swift_version#*.}
          if (( tools_major > swift_major )) || { (( tools_major == swift_major )) && (( tools_minor > swift_minor )); }; then
            echo "::error::Package.swift requires swift-tools-version $tools_version but runner has Swift $swift_version. Lower swift-tools-version or upgrade the pinned Xcode."
            exit 1
          fi
          echo "swift-tools-version=$tools_version OK against runner Swift $swift_version"

      - name: Lint — BaseChatUI does not import BaseChatUIModelManagement
        # The two modules form a one-way edge: BaseChatUIModelManagement depends
        # on BaseChatUI, never the other way around. A back-edge would close the
        # cycle the v2.0 peel was designed to break. The cycle is currently
        # dissolved by closure-injecting `APIConfigurationView` into ChatView and
        # GenerationSettingsView; this lint guards against accidental regression.
        run: |
          set -euo pipefail
          if grep -RIn --include='*.swift' '^[[:space:]]*import[[:space:]]\+BaseChatUIModelManagement' Sources/BaseChatUI/; then
            echo "::error::BaseChatUI must not import BaseChatUIModelManagement (would close the dep cycle)."
            exit 1
          fi
          echo "BaseChatUI -> BaseChatUIModelManagement edge is clean."

      - name: Lint — Macro plugin builds inside the SwiftPM sandbox
        # SwiftPM compiles macro plugins (`BaseChatMacrosPlugin`) inside a
        # sandbox-exec jail by default on macOS. The jail blocks network
        # access and most filesystem writes, which is the only thing
        # standing between a compromised swift-syntax dependency and
        # exfiltrating local secrets at compile time (see #726).
        #
        # `Package.swift` can opt out of the jail via `unsafeFlags`. This
        # lint refuses to merge any change that introduces such an opt-out
        # in the macro plugin target or globally.
        run: |
          set -euo pipefail
          if grep -nE 'unsafeFlags|--disable-sandbox|SWIFTPM_DISABLE_SANDBOX' Package.swift; then
            echo "::error::Package.swift must not disable the SwiftPM macro/build sandbox."
            echo "::error::Macro plugins (BaseChatMacrosPlugin) must run sandboxed — see issue #726."
            exit 1
          fi
          # Defensive: guard against anyone wiring --disable-sandbox into a
          # workflow's swift build/test invocation. Excluded paths are this
          # file's own commentary and the threat-model docs that quote the flag.
          if grep -RIn --include='*.yml' --exclude='ci.yml' -- '--disable-sandbox' .github/workflows/; then
            echo "::error::Workflow scripts must not pass --disable-sandbox to swift build/test."
            exit 1
          fi
          echo "Macro plugin sandbox posture OK."

      - name: Verify Package.resolved is up to date
        # Was a separate `resolve-check` job on its own macos-15 runner; folding
        # it into `test` removes one 10×-billed runner per PR and eliminates the
        # second queue wait that `needs: [resolve-check]` imposed.
        # Gated on the deps-changed filter: Package.resolved can only go stale
        # when Package.swift is edited, so skipping when neither file changed
        # avoids ~47s of wasted resolve work on the typical PR (~15% of total CI).
        if: steps.deps-changed.outputs.deps == 'true'
        run: |
          swift package resolve
          git diff --exit-code Package.resolved || \
            (echo "Package.resolved is stale — run 'swift package resolve' and commit the result." && exit 1)

      # CI smoke profile (GitHub macOS Apple Silicon runners):
      # - Runs BaseChatCoreTests + BaseChatInferenceTests + BaseChatInferenceSwiftTestingTests
      #   + BaseChatMCPTests + BaseChatUITests + BaseChatBackendsTests + BaseChatTestSupportTests.
      # - BaseChatInferenceTests contains XCTest suites only; Swift Testing suites live in
      #   BaseChatInferenceSwiftTestingTests to prevent a libmalloc SIGABRT from mixed harnesses.
      # - --disable-default-traits skips MLX (default-enabled) to avoid metallib
      #   crashes in CI — Metal shaders are only compiled by Xcode.
      # - BaseChatBackendsTests without traits runs only CI-safe cloud/SSE tests.
      # Local-only coverage:
      # - Run `swift test --filter BaseChatBackendsTests --traits MLX,Llama` on
      #   Apple Silicon for MLX/llama.cpp paths.
      # - Run `swift test --filter BaseChatE2ETests` on physical hardware.

      # --skip-update: Package.resolved pins every dependency, so the graph is
      # already up to date (the Verify step re-confirms this when deps changed).
      # Without this flag, every `swift build`/`swift test` invocation re-contacts
      # every git remote (~10-15s).
      #
      # The XCTest batch below compiles the test bundle on first invocation,
      # so a separate `swift build --build-tests` step would be duplicate work.

      # All XCTest-only suites run in one process. Swift Testing must stay
      # isolated — mixing XCTest + Swift Testing in one swift test process
      # triggers a libmalloc double-free SIGABRT (see SwiftTestingAuditTest, #681).
      #
      # Do NOT add --parallel here. swift test --parallel launches each XCTest
      # in a separate process, but UserDefaults.standard is keyed by bundle ID
      # and persists to the same on-disk plist across processes — so tests that
      # touch UserDefaults race across worker processes (see #756, the
      # ChatViewModelTests.test_autoSelectFirstRunModel_* pair). Serial XCTest
      # execution avoids that and `--parallel` would still need a UI-test-only
      # carve-out, which negates most of the speedup anyway.
      - name: Test — XCTest suites (Core + UI + UIModelManagement + MCP + Backends + Inference + TestSupport)
        timeout-minutes: 25
        run: scripts/test.sh --filter BaseChatCoreTests --filter BaseChatUITests --filter BaseChatUIModelManagementTests --filter BaseChatMCPTests --filter BaseChatBackendsTests --filter BaseChatInferenceTests --filter BaseChatTestSupportTests --filter BaseChatAppIntentsTests --disable-default-traits --skip-update

      - name: Test — Inference (Swift Testing, isolated process)
        timeout-minutes: 25
        run: scripts/test.sh --filter BaseChatInferenceSwiftTestingTests --disable-default-traits --skip-update

      - name: Stage test diagnostics
        # scripts/test.sh writes full captured output to $TMPDIR/test_output.txt
        # but $TMPDIR on macOS runners is a per-process /var/folders path that
        # actions/upload-artifact cannot reliably address. Copy into the
        # workspace so the upload step below can find it. Each test step
        # overwrites this file, so on failure it holds the failing step's log.
        if: failure()
        run: |
          mkdir -p test-diagnostics
          if [ -n "${TMPDIR:-}" ] && [ -f "${TMPDIR}/test_output.txt" ]; then
            cp "${TMPDIR}/test_output.txt" test-diagnostics/test_output.txt
          fi
          # Best-effort: copy any xcresult bundles a future xcodebuild step
          # might have produced under DerivedData.
          find "${HOME}/Library/Developer/Xcode/DerivedData" -type d -name "*.xcresult" -maxdepth 6 2>/dev/null \
            | while read -r r; do cp -R "$r" test-diagnostics/ || true; done

      - name: Upload test diagnostics on failure
        # swift test does not produce .xcresult bundles, so we upload whatever
        # diagnostics the failing step left behind (captured stdout/stderr,
        # plus any xcresult bundles if they exist).
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: xcresult-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 7
          path: test-diagnostics/
