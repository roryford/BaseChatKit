name: CI

on:
  push:
    branches: [main]
    paths:
      - "Sources/**"
      - "Tests/**"
      - "Package.swift"
      - "Package.resolved"
      - ".github/workflows/ci.yml"
      - "scripts/**"
  pull_request:
    branches: [main]
    paths:
      - "Sources/**"
      - "Tests/**"
      - "Package.swift"
      - "Package.resolved"
      - ".github/workflows/ci.yml"
      - "scripts/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  resolve-check:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Verify Package.resolved is up to date
        run: |
          swift package resolve
          git diff --exit-code Package.resolved || \
            (echo "Package.resolved is stale — run 'swift package resolve' and commit the result." && exit 1)

  test:
    runs-on: macos-15  # Apple Silicon (arm64) standard runner to reduce spend
    needs: [resolve-check]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        id: setup-xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          # Pin to a specific version for reproducible builds and to skip the
          # version-discovery API call that `latest-stable` requires.
          xcode-version: "26.3"

      - name: Cache SwiftPM build
        uses: actions/cache@v5
        with:
          path: |
            .build/artifacts
            .build/checkouts
            .build/repositories
            .build/debug
          key: ${{ runner.os }}-${{ runner.arch }}-xcode-26.3-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-xcode-26.3-spm-
            ${{ runner.os }}-${{ runner.arch }}-spm-

      # CI smoke profile (GitHub macOS Apple Silicon runners):
      # - Runs BaseChatCoreTests + BaseChatInferenceTests + BaseChatInferenceSwiftTestingTests
      #   + BaseChatUITests + BaseChatBackendsTests.
      # - BaseChatInferenceTests contains XCTest suites only; Swift Testing suites live in
      #   BaseChatInferenceSwiftTestingTests to prevent a libmalloc SIGABRT from mixed harnesses.
      # - --disable-default-traits skips MLX (default-enabled) to avoid metallib
      #   crashes in CI — Metal shaders are only compiled by Xcode.
      # - BaseChatBackendsTests without traits runs only CI-safe cloud/SSE tests.
      # Local-only coverage:
      # - Run `swift test --filter BaseChatBackendsTests --traits MLX,Llama` on
      #   Apple Silicon for MLX/llama.cpp paths.
      # - Run `swift test --filter BaseChatE2ETests` on physical hardware.

      - name: Build
        run: swift build --build-tests --disable-default-traits

      - name: Test — Core
        run: scripts/test.sh --filter BaseChatCoreTests --disable-default-traits

      - name: Test — Inference (XCTest)
        run: scripts/test.sh --filter BaseChatInferenceTests --disable-default-traits

      - name: Test — Inference (Swift Testing)
        run: scripts/test.sh --filter BaseChatInferenceSwiftTestingTests --disable-default-traits

      - name: Test — UI
        run: scripts/test.sh --filter BaseChatUITests --disable-default-traits

      - name: Test — Backends
        run: scripts/test.sh --filter BaseChatBackendsTests --disable-default-traits
