name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    # Cancelling in-progress runs is safe here — only the latest matters.
    concurrency:
      group: release-please
      cancel-in-progress: true
    outputs:
      release_created: ${{ steps.release-please.outputs.release_created }}
      tag_name: ${{ steps.release-please.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release-please
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  sync-release-notes:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract changelog entry
        env:
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          python3 - <<'EOF'
          import os, re, sys

          tag = os.environ["TAG_NAME"]
          version = tag.lstrip("v")

          text = open("CHANGELOG.md").read()
          # Match from the version header to the next version header (or end of file)
          pattern = rf"## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n## \[|\Z)"
          m = re.search(pattern, text, re.DOTALL)
          notes = m.group(1).strip() if m else ""

          if not notes:
              print(f"WARNING: No changelog entry found for {version}", file=sys.stderr)
              sys.exit(1)

          with open("/tmp/release_notes.md", "w") as f:
              f.write(notes)

          print(f"Extracted {len(notes)} chars for {version}")
          EOF

      - name: Update GitHub release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          gh release edit "$TAG_NAME" --notes-file /tmp/release_notes.md
