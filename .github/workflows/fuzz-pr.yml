name: Fuzz (PR tier)

# PR-tier fuzzing: hardware-free, deterministic, zero flake tolerance. Any new
# finding hash not in `.github/fuzz-allowlist.json` (or any expired allowlist
# entry) fails the job. Pin to `--seed 1` + `--corpus-subset smoke` so the run
# is bit-reproducible across PRs.
#
# Runs on `macos-latest` (GitHub-hosted) so every PR gets coverage without
# depending on a self-hosted runner.

on:
  pull_request:
    paths:
      - "Sources/**"
      - "Tests/**"
      - "Package.swift"
      - "Package.resolved"
      - ".github/fuzz-allowlist.json"
      - ".github/workflows/fuzz-pr.yml"
      - "scripts/fuzz-ci-gate.sh"

concurrency:
  group: fuzz-pr-${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  fuzz:
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Cache SwiftPM build
        uses: actions/cache@v5
        with:
          path: |
            .build/artifacts
            .build/checkouts
            .build/repositories
            .build/debug
          key: ${{ runner.os }}-${{ runner.arch }}-xcode-26.3-fuzz-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-xcode-26.3-fuzz-spm-
            ${{ runner.os }}-${{ runner.arch }}-xcode-26.3-spm-

      # MockInferenceBackend + ChaosBackend do not need MLX or Llama, but the
      # fuzz-chat executable's dependency graph pulls `BaseChatBackends` in.
      # Disabling default traits drops MLX + Llama compilation time — the mock
      # path does not instantiate them at runtime.
      - name: Run fuzz (PR tier, mock backend, 200 iter, seed 1)
        run: |
          swift run --disable-default-traits fuzz-chat \
            --backend mock \
            --iterations 200 \
            --seed 1 \
            --corpus-subset smoke \
            --quiet

      - name: Gate findings against allowlist
        run: bash scripts/fuzz-ci-gate.sh tmp/fuzz/index.json

      - name: Upload findings (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-pr-findings-${{ github.run_id }}
          path: tmp/fuzz/
          if-no-files-found: ignore
