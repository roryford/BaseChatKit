name: Fuzz (nightly)

# Nightly-tier fuzzing: 10 minutes against a real Ollama model on a self-hosted
# Apple-Silicon runner. Fails the build only on `confirmed`-severity findings,
# leaving `flaky` leads as artefacts for triage.
#
# Requires a self-hosted runner labelled `[self-hosted, macos, arm64]`
# with Ollama installed and `qwen3.5:4b` pulled. Until such a runner exists,
# scheduled runs will sit in the queue — see FUZZING.md § CI tiers.

on:
  schedule:
    # 05:00 UTC daily — quiet window, before the PR-tier traffic ramps.
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  fuzz:
    runs-on: [self-hosted, macos, arm64]
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run fuzz (nightly, 10 min, Ollama qwen3.5:4b)
        run: |
          swift run fuzz-chat \
            --backend ollama \
            --model qwen3.5:4b \
            --minutes 10 \
            --seed ${{ github.run_number }}

      # Nightly tier tolerates `flaky` findings (those are leads, not proof).
      # A `confirmed` finding means `--replay` already reproduced it 2-of-3 or
      # better — that is a real regression and must fail the build.
      - name: Fail on confirmed findings
        if: always()
        run: |
          if [[ ! -f tmp/fuzz/index.json ]]; then
            echo "fuzz-nightly: no index.json — campaign produced no output, treating as green."
            exit 0
          fi
          confirmed=$(python3 -c '
          import json, sys
          with open("tmp/fuzz/index.json") as f:
              data = json.load(f)
          rows = data.get("rows", []) if isinstance(data, dict) else data
          n = 0
          for row in rows:
              finding = row.get("finding", row)
              if finding.get("severity") == "confirmed":
                  n += 1
          print(n)
          ')
          if [[ "$confirmed" != "0" ]]; then
            echo "::error::${confirmed} confirmed finding(s); see tmp/fuzz/INDEX.md"
            cat tmp/fuzz/INDEX.md || true
            exit 1
          fi
          echo "fuzz-nightly: no confirmed findings."

      - name: Upload findings artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-nightly-findings-${{ github.run_id }}
          path: tmp/fuzz/
          if-no-files-found: ignore
